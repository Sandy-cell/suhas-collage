    <style>
      .dept-visit-header {
        grid-column: 1 / -1;
        text-align: center;
        margin: 0 0 30px 0;
        font-size: clamp(22px, 3vw, 28px);
        font-weight: 700;
        color: var(--primary, #0A2540);
        padding: 15px 0;
        border-bottom: 2px solid var(--accent, #D4AF37);
        background: linear-gradient(135deg, rgba(212,175,55,0.05) 0%, transparent 100%);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(212,175,55,0.1);
      }
      
      @media (max-width: 768px) {
        .dept-visit-header {

          font-size: 24px;
        }
      }
      
      /* Minimal Lightbox CSS */
      #image-lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.9);
        z-index: 10000;
        align-items: center;
        justify-content: center;
      }
      
      #image-lightbox.active {
        display: flex;
      }
      
      #lightbox-img {
        max-width: 95vw;
        max-height: 95vh;
        object-fit: contain;
        border-radius: 8px;
      }
      
      #lightbox-close {
        position: absolute;
        top: 20px;
        right: 30px;
        color: white;
        font-size: 30px;
        cursor: pointer;
      }
      
      .visit-tabs {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin: 30px 0;
        flex-wrap: wrap;
      }
      
      .visit-tab-btn {

        background: var(--white);

        color: var(--primary);
        border-radius: 25px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      
      .visit-tab-btn.active {
        background: var(--primary);
        color: var(--white);
        box-shadow: 0 5px 15px rgba(10,37,64,0.3);
      }
      
      .visit-grid {
        display: none;
      }
      
      .visit-grid.active {
        display: grid;
      }
    </style>

<!-- Tab + Lightbox JS -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Tab functionality
    const tabBtns = document.querySelectorAll('.visit-tab-btn');
    const grids = document.querySelectorAll('.visit-grid');
    
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const targetTab = btn.getAttribute('data-tab');
            
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            grids.forEach(g => g.classList.remove('active'));
            document.getElementById(targetTab + '-grid').classList.add('active');
        });
    });
    
    // Lightbox functionality
    const lightbox = document.getElementById('image-lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const closeBtn = document.getElementById('lightbox-close');
    
    document.querySelectorAll('[data-lightbox-src]').forEach(img => {
        img.style.cursor = 'pointer';
        img.addEventListener('click', function(e) {
            e.stopPropagation();
            lightboxImg.src = this.getAttribute('data-lightbox-src');
            lightboxImg.alt = this.alt;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        });
    });
    
    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
    }
    
    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => {
        if (e.target === lightbox) closeLightbox();
    });
    
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeLightbox();
    });
});
</script>
