<!DOCTYPE html>

<style>

/* ================= GLOBAL ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#ffffff;
    color:#333333;
    line-height:1.6;
}

/* ================= HEADER ================= */

header{
    background:white;
    padding:25px 20px;
    border-top:4px solid #f4b400;
    border-bottom:4px solid #0b2c5a;
    display:flex;
    justify-content:center;
    align-items:center;
}

header img{
    width:80px;
    height:auto;
    margin-right:25px;
}

.college-name{
    text-align:center;
    max-width:800px;
}

.college-name p:first-child{
    font-size:14px;
    color:#666;
    letter-spacing:0.5px;
    margin-bottom:6px;
}

.college-name h1{
    font-size:30px;
    color:#0b2c5a;
    font-weight:700;
    letter-spacing:1px;
    margin-bottom:6px;
}

.college-name h2{
    font-size:17px;
    color:#0077ff;
    font-weight:600;
    margin-bottom:8px;
    text-align:center;
}

.college-name p:last-child{
    font-size:13px;
    color:#555;
    letter-spacing:0.3px;
}

/* ================= NAVBAR ================= */

nav{
    background:linear-gradient(135deg, #0b2c5a 0%, #1a3d6e 50%, #0b2c5a 100%);
    padding:14px 20px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    box-shadow:0 4px 20px rgba(11, 44, 90, 0.3);
    border-bottom:3px solid #0077ff;
}

.nav-links{
    display:flex;
    gap:28px;
    align-items:center;
}

.nav-links a{
    color:#ffffff;
    text-decoration:none;
    font-size:16px;
    font-weight:500;
    cursor:pointer;
    position:relative;
    padding:8px 12px;
    border-radius:5px;
    transition:all 0.3s ease;
}

.nav-links a::after{
    content:'';
    position:absolute;
    width:0;
    height:2px;
    bottom:0;
    left:50%;
    background:#f4b400;
    transition:all 0.3s ease;
    transform:translateX(-50%);
}

.nav-links a:hover::after{
    width:80%;
}

.nav-links a:hover{
    color:#f4b400;
    background:rgba(255, 255, 255, 0.1);
}

/* ================= FORM HEADER ================= */

.form-header{
    background:linear-gradient(135deg, #0b2c5a 0%, #1a3d6e 100%);
    color:white;
    text-align:center;
    padding:30px 20px;
}

.form-header h1{
    margin:0;
    font-size:28px;
}

/* ================= FORM SECTION ================= */

.form-section{
    padding:70px 40px;
    background:#f0f6ff;
}

.form-container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.form-container h2{
    text-align:center;
    margin-bottom:25px;
    color:#0b2c5a;
    font-size:24px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
    color:#333;
}

input, select, textarea{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
    transition:border-color 0.3s ease;
}

input:focus, select:focus, textarea:focus{
    outline:none;
    border-color:#0077ff;
}

/* ================= BUTTON ================= */

.submit-btn{
    width:100%;
    padding:14px;
    background:linear-gradient(135deg, #0077ff, #00c6ff);
    color:white;
    border:none;
    border-radius:30px;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 6px 18px rgba(0,0,0,0.2);
}

.submit-btn:hover{
    background:linear-gradient(135deg, #0057d9, #0099cc);
    transform:translateY(-2px);
    box-shadow:0 8px 22px rgba(0,0,0,0.25);
}

.success-msg{
    margin-top:15px;
    color:green;
    text-align:center;
    font-weight:bold;
}

/* ================= FOOTER ================= */

footer{
    background:#082544;
    color:#e6e6e6;
    text-align:center;
    padding:18px;
    font-size:14px;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){
    header{
        flex-direction:column;
        text-align:center;
    }
    
    header img{
        margin-right:0;
        margin-bottom:12px;
    }
    
    .form-section{
        padding:40px 20px;
    }
    
    .form-container{
        padding:30px 20px;
    }
}

/* ================= LANGUAGE BOX ================= */

.language-box{
    position:absolute;
    top:20px;
    right:20px;
}

.toggle-container{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:bold;
}

.lang-label{
    color:white;
    font-size:12px;
}

.toggle-switch{
    position:relative;
    display:inline-block;
    width:50px;
    height:24px;
}

.toggle-switch input{
    opacity:0;
    width:0;
    height:0;
}

.toggle-slider{
    position:absolute;
    cursor:pointer;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background-color:#002244;
    border-radius:34px;
    transition:0.4s;
}

.toggle-slider:before{
    position:absolute;
    content:"";
    height:18px;
    width:18px;
    left:3px;
    bottom:3px;
    background:white;
    border-radius:50%;
    transition:0.4s;
}

input:checked + .toggle-slider{
   background-color:#0077ff;
}

input:checked + .toggle-slider:before{
    transform:translateX(26px);
}

</style>
</head>
